name: Update Add-on Info

on:
  workflow_dispatch:
  schedule:
    - cron: "00 02 * * *"

defaults:
  run:
    working-directory: scripts/addon-parser

jobs:
  add-on-update:
    name: Update Add-ons
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Set Node Version
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: scripts/addon-parser/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run addon-parser and get site stats
        run: node app.mjs --kv=omega --getstats

      - name: Push new files back
        uses: mikeal/publish-to-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: "main"
